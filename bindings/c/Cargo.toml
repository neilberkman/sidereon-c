[package]
name = "sidereon-c"
version = "0.22.0"
authors = []
edition = "2021"
description = "C ABI bindings over the sidereon ergonomic API: opaque handles, integer error codes, caller-allocated buffers"
license = "MIT"
publish = false

[lib]
# Built as a C shared library `libsidereon.{dylib,so}` (and a static archive for
# fully static links). The C header is generated from this crate's source with
# cbindgen into `include/sidereon.h`.
name = "sidereon"
crate-type = ["cdylib", "staticlib"]

[dependencies]
# The thin ergonomic engine surface this binding marshals to. No modeling logic
# lives here: every solve delegates to a `sidereon` entry point, which in turn
# delegates to `sidereon-core`. The numbers are exactly what the engine produces.
# Dev mode for the local core surface.
sidereon = "0.22.0"
sidereon-core = "0.22.0"
serde_json = "1"
# The generic data-driven trust-region least-squares engine the headline TRLS
# entry points marshal to. Not re-exported by the `sidereon` facade, so it is a
# direct dependency.
trust-region-least-squares = "0.9.1"
# `nalgebra` (pinned to the core's version) builds the dense `DMatrix` the
# covariance/Hessian-trace primitives take by reference; this binding owns no
# modeling math, it only marshals the caller's row-major buffer into the matrix
# type the core entry points require.
nalgebra = "0.33"
