# cbindgen configuration for the sidereon C bindings.
#
# Regenerate the header with:
#   cbindgen --config cbindgen.toml --crate sidereon-c --output include/sidereon.h
#
# The opaque handle types (SidereonSp3, SidereonSppSolution, RTK/PPP solutions) wrap Rust types
# with no C representation, so cbindgen emits them as forward-declared opaque structs.
language = "C"
header = """/* sidereon C bindings. Generated by cbindgen; do not edit by hand. */

/**
 * @file sidereon.h
 * @brief C ABI for the sidereon positioning engine.
 *
 * Ownership and threading:
 * sidereon_sp3_load, sidereon_sp3_merge, sidereon_solve_spp,
 * sidereon_solve_spp_v2, sidereon_solve_rtk_float,
 * sidereon_solve_rtk_fixed, sidereon_solve_ppp_float, and
 * sidereon_solve_ppp_fixed, plus the TLE, propagation, pass-list, batch, and
 * ephemeris creation functions, transfer a newly allocated opaque handle to
 * the caller through an out-parameter. Release each non-null handle exactly
 * once with its matching _free function. Passing NULL to a _free function is a
 * no-op.
 * Last-error storage is thread-local. Opaque handles are read-only shareable
 * after creation, but any concurrent _free invalidates the handle and any
 * borrowed pointers.
 *
 * Status and outputs:
 * SIDEREON_STATUS_OK is the only success value. On failure, the call records a
 * thread-local error message (sidereon_last_error_message); sidereon_status_message
 * maps a status code to a fixed name. Output handles may be set to NULL, and
 * scalar or count out-parameters may be initialized or cleared before validation
 * completes. No newly owned handle is transferred unless the call returns
 * SIDEREON_STATUS_OK.
 *
 * Variable-length outputs:
 * Pass NULL with len 0 to query the required element count via out_required.
 * If the supplied buffer is too small, the function returns
 * SIDEREON_STATUS_INVALID_ARGUMENT, writes zero elements, and reports the
 * required count.
 */
"""
include_guard = "SIDEREON_H"
pragma_once = true
cpp_compat = true
tab_width = 4
# `both` emits `typedef struct Name { ... } Name;` so every value struct and enum
# carries a tag and is forward-declarable, while the unsuffixed typedef name the
# callers use stays unchanged.
style = "both"
documentation = true
documentation_style = "doxy"
sort_by = "Name"
usize_is_size_t = true
# Compile-time version, kept in step with the crate version and the
# sidereon_version / sidereon_version_string accessors.
after_includes = """

#define SIDEREON_VERSION_MAJOR 0
#define SIDEREON_VERSION_MINOR 19
#define SIDEREON_VERSION_PATCH 0
#define SIDEREON_VERSION_STRING "0.19.0\""""

[enum]
# Idiomatic C enum constants: SidereonStatus::Ok -> SIDEREON_STATUS_OK.
rename_variants = "QualifiedScreamingSnakeCase"

